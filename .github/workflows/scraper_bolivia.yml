name: 🇧🇴 Bolivia 24h Scraper (Auto-Run)

on:
  schedule:
    # Ejecuta todos los días a las 05:00 UTC (01:00 en Bolivia / 00:00 en Ecuador)
    - cron: '0 5 * * *'
  workflow_dispatch: # Activa un botón mágico para que puedas correrlo manualmente cuando quieras

permissions:
  contents: write # Permiso de seguridad para que el bot pueda guardar el CSV en tu repositorio

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest # Crea una computadora virtual con Linux
    
    steps:
      - name: 1. Descargar el repositorio a la máquina virtual
        uses: actions/checkout@v4

      - name: 2. Instalar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Instalar librerías (Dependencias)
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas lxml cloudscraper

      - name: 4. Ejecutar el motor de extracción (Scraper)
        run: |
          cd Scrapers/Bolivia_24h
          python bolivia_24h_tracker.py
      
      - name: 5. Guardar (Commit) y subir el nuevo CSV al repositorio
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git fetch origin main
          git stash
          git rebase origin/main
          git stash pop || true
          git add Data/Raw/noticias_bo_*.csv
          git commit -m "Auto-update: Datos de prensa boliviana recolectados 🤖" || echo "No hay noticias nuevas hoy"
          git push
